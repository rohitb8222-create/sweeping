            margin-bottom: 8px;
            color: #444;

        select, input[type="date"], button {

            border-radius: 4px;
            font-size: 15px;
            background: #fff;
            outline: none;
            transition: 0.3s;
        }
        select:focus, input[type="date"]:focus {
            border-color: #2c3e50;
        }
        select:disabled {
            background: #f1f3f4;
            cursor: not-allowed;
        }
        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 5px;
            max-height: 350px;
            overflow-y: auto;
            padding: 15px;
            border: 1px solid #e0e5e9;
            border-radius: 4px;
            background: #f8fafc;
        }
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px;
            border-radius: 4px;
            transition: background 0.2s;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .checkbox-item:last-child {
            border-bottom: none;
        }
        .checkbox-item:hover {
            background: #edf2f7;
        }
        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #2c3e50;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .route-label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
            flex-grow: 1;
            line-height: 1.4;
            font-size: 14px;
        }
        .route-id {
            font-weight: bold;
            color: #2c3e50;
        }
        .bin-control {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: 10px;
            padding: 4px 8px;
            background: #fff3cd;
            border: 1px solid #ffeeba;
            border-radius: 4px;
            flex-shrink: 0;
        }
        .bin-control label {
            margin-bottom: 0;
            color: #856404;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }
        .bin-control input[type="checkbox"] {
            accent-color: #d39e00;
            margin-top: 0;
            width: 16px;
            height: 16px;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #cdd3d8;
            border-radius: 4px;
            height: 250px;
            font-size: 14px;
            resize: vertical;
            background: #fafafa;
            outline: none;
            font-family: monospace;
        }
        textarea:focus {
            border-color: #2c3e50;
        }
        .btn-copy {
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 15px;
            font-weight: bold;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-copy:hover {
            background-color: #1a252f;
        }
        .btn-copy:active {
            transform: scale(0.98);
        }

        /* --- Welcome Popup Styles --- */
        .welcome-popup {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #ffffff;
            border-left: 6px solid #f39c12;
            color: #333;
            padding: 15px 25px;
            border-radius: 8px;

        }
        .popup-icon {
            font-size: 28px;
        }
        .popup-text {
            line-height: 1.4;
        }
        .popup-text span {
            color: #f39c12;
            font-weight: bold;
            font-size: 18px;
        }

</head>

            <label for="message">Generated Message:</label>
            <textarea id="message" readonly placeholder="Message will be generated here..."></textarea>

    </div>

    const dateInput = document.getElementById('deploy-date');
    const wardSelect = document.getElementById('ward');
    const unitSelect = document.getElementById('unit');
    const routesContainer = document.getElementById('routes-container');
    const routesList = document.getElementById('routes-list');
    const messageBox = document.getElementById('message');

    window.onload = function() {
        // --- Show Welcome Popup Logic ---
        const popup = document.getElementById('welcome-popup');
        setTimeout(() => {
            popup.classList.add('show');
        }, 500); // 0.5 sec delay before showing
        
        setTimeout(() => {
            popup.classList.remove('show');
        }, 4500); // Hide after 4 seconds
        // --------------------------------

        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        dateInput.value = yyyy + "-" + mm + "-" + dd;

        const wards = Object.keys(data).sort();
        wards.forEach(ward => {
            let option = document.createElement('option');
            option.value = ward;
            option.textContent = "Ward " + ward;
            wardSelect.appendChild(option);
        });
    };

    function populateUnits() {
        const selectedWard = wardSelect.value;
        unitSelect.innerHTML = '<option value="">-- Select Unit --</option>';
        routesContainer.style.display = 'none';
        messageBox.value = '';
        
        if (selectedWard) {
            unitSelect.disabled = false;
            const units = Object.keys(data[selectedWard]).sort((a, b) => parseInt(a) - parseInt(b));
            units.forEach(unit => {
                let option = document.createElement('option');
                option.value = unit;
                option.textContent = "Unit " + unit;
                unitSelect.appendChild(option);
            });
        } else {
            unitSelect.disabled = true;
        }
        updateMessage();
    }

    function populateRoutes() {
        const selectedWard = wardSelect.value;
        const selectedUnit = unitSelect.value;
        routesList.innerHTML = '';
        
        if (selectedWard && selectedUnit) {
            routesContainer.style.display = 'block';
            
            // Sort routes numerically
            const routes = data[selectedWard][selectedUnit].routes.sort((a, b) => {
                return parseInt(a.id.substring(1)) - parseInt(b.id.substring(1));
            });
            
            routes.forEach((routeObj, idx) => {
                let div = document.createElement('div');
                div.className = 'checkbox-item';
                
                // Main route checkbox
                let checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.id = 'route_' + idx;
                checkbox.value = routeObj.id;
                checkbox.onchange = updateMessage;
                
                // Route label
                let label = document.createElement('label');
                label.className = 'route-label';
                label.htmlFor = 'route_' + idx;
                label.innerHTML = "<span class='route-id'>" + routeObj.id + "</span> - " + routeObj.name;
                
                // Bin control box
                let binDiv = document.createElement('div');
                binDiv.className = 'bin-control';
                
                let binCheckbox = document.createElement('input');
                binCheckbox.type = 'checkbox';
                binCheckbox.id = 'bin_' + idx;
                binCheckbox.onchange = function() {
                    // Auto-check route if Bin is checked
                    if(this.checked) {
                        checkbox.checked = true;
                    }
                    updateMessage();
                };
                
                let binLabel = document.createElement('label');
                binLabel.htmlFor = 'bin_' + idx;
                binLabel.textContent = "Bin";
                
                binDiv.appendChild(binCheckbox);
                binDiv.appendChild(binLabel);
                
                div.appendChild(checkbox);
                div.appendChild(label);
                div.appendChild(binDiv);
                
                routesList.appendChild(div);
            });
        } else {
            routesContainer.style.display = 'none';
        }
        updateMessage();
    }

    function updateMessage() {
        const selectedWard = wardSelect.value;
        const selectedUnit = unitSelect.value;
        const selectedDateVal = dateInput.value;
        
        if (!selectedWard || !selectedUnit) {
            messageBox.value = '';
            return;
        }

        let selectedRoutes = [];
        const items = routesList.querySelectorAll('.checkbox-item');
        
        items.forEach(item => {
            const routeCb = item.querySelector('input[id^="route_"]');
            const binCb = item.querySelector('input[id^="bin_"]');
            
            if (routeCb && routeCb.checked) {
                let routeText = routeCb.value;
                if (binCb && binCb.checked) {
                    routeText += " Bin"; // Adds ' Bin' if checked
                }
                selectedRoutes.push(routeText);
            }
        });

        let dateString = "";
        if(selectedDateVal) {
            const dateObj = new Date(selectedDateVal);
            const d = String(dateObj.getDate()).padStart(2, '0');
            const m = String(dateObj.getMonth() + 1).padStart(2, '0');
            const y = dateObj.getFullYear();
            dateString = d + "-" + m + "-" + y;
        }

        let msg = "SUMEET ELKO\n";
        msg += "Sweeping Deployment\n\n";
        msg += "Date: " + dateString + "\n";
        msg += "Ward: " + selectedWard + "\n";
        msg += "Unit: " + selectedUnit + "\n";
        
        msg += "\nDeployed Routes:\n";
        
        if (selectedRoutes.length > 0) {
            selectedRoutes.forEach((routeStr, index) => {
                msg += (index + 1) + ". " + routeStr + "\n";
            });
        } else {
            msg += "(No routes selected yet)\n";
        }

        messageBox.value = msg;
    }

    function copyMessage() {
        if(!messageBox.value) {
            alert("Copy karnyapurvi details select kara!");
            return;
        }
        messageBox.select();
        document.execCommand("copy");
        
        const copyBtn = document.querySelector('.btn-copy');
        const originalText = copyBtn.innerHTML;
        copyBtn.innerHTML = 'Message Copied!';
        copyBtn.style.backgroundColor = '#1e7e34';
        
        setTimeout(() => {
            copyBtn.innerHTML = originalText;
            copyBtn.style.backgroundColor = '#2c3e50';
        }, 2000);
    }
