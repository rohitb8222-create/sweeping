<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today Sweeping Deployment Generator</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #27ae60;
            --bg-color: #ecf0f1;
            --card-bg: #ffffff;
            --text-color: #333333;
            --border-color: #bdc3c7;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .container {
            background-color: var(--card-bg);
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 1.5rem;
            border-bottom: 2px solid var(--secondary-color);
            padding-bottom: 10px;
            display: inline-block;
            width: 100%;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary-color);
        }
        
        select, input[type="date"] {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
            background-color: #f9fbfd;
        }
        
        select:focus, input[type="date"]:focus {
            border-color: var(--secondary-color);
        }
        
        .routes-group {
            background-color: #f9fbfd;
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            max-height: 250px;
            overflow-y: auto;
            display: none;
        }
        
        .routes-group h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--primary-color);
        }
        
        .checkbox-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        
        .checkbox-item input[type="checkbox"] {
            margin-top: 4px;
            margin-right: 10px;
            width: 18px;
            height: 18px;
            accent-color: var(--secondary-color);
            cursor: pointer;
        }
        
        .checkbox-item label {
            font-weight: normal;
            color: var(--text-color);
            cursor: pointer;
            line-height: 1.4;
            margin-bottom: 0;
        }
        
        .message-box {
            margin-top: 25px;
        }
        
        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 0.95rem;
            resize: vertical;
            background-color: #fdfdfd;
            line-height: 1.5;
            outline: none;
        }
        
        textarea:focus {
            border-color: var(--secondary-color);
        }
        
        button {
            width: 100%;
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #219653;
        }
        
        .copy-feedback {
            text-align: center;
            color: var(--secondary-color);
            margin-top: 10px;
            font-weight: bold;
            display: none;
            font-size: 0.9rem;
        }
        
        /* Custom Scrollbar */
        .routes-group::-webkit-scrollbar {
            width: 6px;
        }
        .routes-group::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .routes-group::-webkit-scrollbar-thumb {
            background: #bdc3c7; 
            border-radius: 3px;
        }
        .routes-group::-webkit-scrollbar-thumb:hover {
            background: #95a5a6; 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🧹 Today Sweeping Deployment</h2>
    
    <div class="form-group">
        <label for="dateSelect">Tarik (Date):</label>
        <input type="date" id="dateSelect">
    </div>
    
    <div class="form-group">
        <label for="wardSelect">Ward Nivad (Select Ward):</label>
        <select id="wardSelect">
            <option value="">-- Ward Select Kara --</option>
        </select>
    </div>
    
    <div class="form-group" id="unitGroup" style="display:none;">
        <label for="unitSelect">Unit Nivad (Select Unit):</label>
        <select id="unitSelect">
            <option value="">-- Unit Select Kara --</option>
        </select>
    </div>
    
    <div class="routes-group" id="routesContainer">
        <h3>📍 Sweeping Routes Select Kara:</h3>
        <div id="checkboxesList"></div>
    </div>
    
    <div class="message-box">
        <label>Generated Message:</label>
        <textarea id="messageOutput" readonly placeholder="Details select kelyawar message ithe disel..."></textarea>
        <button id="copyBtn">📋 Message Copy Kara</button>
        <div id="copyFeedback" class="copy-feedback">Message Copied Successfully! ✅</div>
    </div>
</div>

l Road", "Route_11": "Tisgaon Road"}, {"WARD": "I", "UNIT": 32, "E-WARD": "117", "Route_1": "Kala Talao Road", "Route_2": "Bail Bazaar Road", "Route_3": "Nehru Chowk Road", "Route_4": "Murbad Road", "Route_5": "Vishnu Nagar Road", "Route_6": "Savarkar Road", "Route_7": "Subhash Road", "Route_8": "Bhagat Singh Road", "Route_9": "Godrej Hill Road", "Route_10": "Tisgaon Road", "Route_11": "Chikanghar Road"}, {"WARD": "I", "UNIT": 34, "E-WARD": "119", "Route_1": "Bail Bazaar Road", "Route_2": "Nehru Chowk Road", "Route_3": "Murbad Road", "Route_4": "Vishnu Nagar Road", "Route_5": "Savarkar Road", "Route_6": "Subhash Road", "Route_7": "Bhagat Singh Road", "Route_8": "Godrej Hill Road", "Route_9": "Tisgaon Road", "Route_10": "Chikanghar Road", "Route_11": "Phadke Road"}, {"WARD": "J", "UNIT": 6, "E-WARD": "41-89-90-91", "Route_1": "Nehru Chowk Road", "Route_2": "Murbad Road", "Route_3": "Vishnu Nagar Road", "Route_4": "Savarkar Road", "Route_5": "Subhash Road", "Route_6": "Bhagat Singh Road", "Route_7": "Godrej Hill Road", "Route_8": "Tisgaon Road", "Route_9": "Chikanghar Road", "Route_10": "Phadke Road", "Route_11": "Tilak Chowk Road"}, {"WARD": "J", "UNIT": 30, "E-WARD": "39-40-92-93-94", "Route_1": "Murbad Road", "Route_2": "Vishnu Nagar Road", "Route_3": "Savarkar Road", "Route_4": "Subhash Road", "Route_5": "Bhagat Singh Road", "Route_6": "Godrej Hill Road", "Route_7": "Tisgaon Road", "Route_8": "Chikanghar Road", "Route_9": "Phadke Road", "Route_10": "Tilak Chowk Road", "Route_11": "Agra Road"}, {"WARD": "J", "UNIT": 35, "E-WARD": "42-43-44-45", "Route_1": "Vishnu Nagar Road", "Route_2": "Savarkar Road", "Route_3": "Subhash Road", "Route_4": "Bhagat Singh Road", "Route_5": "Godrej Hill Road", "Route_6": "Tisgaon Road", "Route_7": "Chikanghar Road", "Route_8": "Phadke Road", "Route_9": "Tilak Chowk Road", "Route_10": "Agra Road", "Route_11": "Mahatma Phule Road"}];
    const dataMap = {};
    
    rawData.forEach(row => {
        const ward = row["WARD"];
        if (!ward) return;
        
        if (!dataMap[ward]) {
            dataMap[ward] = [];
        }
        dataMap[ward].push(row);
    });
    
    const dateSelect = document.getElementById('dateSelect');
    const wardSelect = document.getElementById('wardSelect');
    const unitGroup = document.getElementById('unitGroup');
    const unitSelect = document.getElementById('unitSelect');
    const routesContainer = document.getElementById('routesContainer');
    const checkboxesList = document.getElementById('checkboxesList');
    const messageOutput = document.getElementById('messageOutput');
    const copyBtn = document.getElementById('copyBtn');
    const copyFeedback = document.getElementById('copyFeedback');
    
    let currentRowData = null;
    
    // Auto-set Date to Today
    const today = new Date().toISOString().split('T')[0];
    dateSelect.value = today;
    dateSelect.addEventListener('change', generateMessage);
    
    const wards = Object.keys(dataMap).sort();
    wards.forEach(ward => {
        const option = document.createElement('option');
        option.value = ward;
        option.textContent = ward;
        wardSelect.appendChild(option);
    });
    
    wardSelect.addEventListener('change', function() {
        const selectedWard = this.value;
        unitSelect.innerHTML = '<option value="">-- Unit Select Kara --</option>';
        routesContainer.style.display = 'none';
        messageOutput.value = '';
        currentRowData = null;
        
        if (selectedWard) {
            const units = dataMap[selectedWard];
            units.forEach((unitData, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = unitData["UNIT"];
                unitSelect.appendChild(option);
            });
            unitGroup.style.display = 'block';
        } else {
            unitGroup.style.display = 'none';
        }
    });
    
    unitSelect.addEventListener('change', function() {
        const selectedIndex = this.value;
        const selectedWard = wardSelect.value;
        checkboxesList.innerHTML = '';
        messageOutput.value = '';
        
        if (selectedIndex !== "") {
            currentRowData = dataMap[selectedWard][selectedIndex];
            
            const routeKeys = Object.keys(currentRowData).filter(key => key.startsWith('Route_') && currentRowData[key] !== "");
            
            // Sort keys to maintain correct order (Route_1, Route_2, etc.)
            routeKeys.sort((a, b) => {
                return parseInt(a.split('_')[1]) - parseInt(b.split('_')[1]);
            });
            
            if (routeKeys.length > 0) {
                routeKeys.forEach(key => {
                    const routeName = currentRowData[key];
                    if (routeName.trim() !== "") {
                        const routeNum = key.split('_')[1]; 
                        const displayLabel = `R${routeNum} - ${routeName}`; 
                        
                        const div = document.createElement('div');
                        div.className = 'checkbox-item';
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.id = key;
                        checkbox.value = routeName;
                        checkbox.checked = true;
                        
                        checkbox.addEventListener('change', generateMessage);
                        
                        const label = document.createElement('label');
                        label.htmlFor = key;
                        label.textContent = displayLabel;
                        
                        div.appendChild(checkbox);
                        div.appendChild(label);
                        checkboxesList.appendChild(div);
                    }
                });
                
                routesContainer.style.display = 'block';
                generateMessage();
            } else {
                routesContainer.style.display = 'none';
            }
        } else {
            routesContainer.style.display = 'none';
        }
    });
    
    function generateMessage() {
        if (!currentRowData) return;
        
        const ward = currentRowData["WARD"] || "";
        const unit = currentRowData["UNIT"] || "";
        const eWard = currentRowData["E-WARD"] || "";
        
        // Use selected date or fallback to today
        let d = new Date();
        if (dateSelect.value) {
            d = new Date(dateSelect.value);
        }
        const formattedDate = d.getDate().toString().padStart(2, '0') + '/' + 
                              (d.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                              d.getFullYear();
        
        let message = `*Sumeet Elko*\n`;
        message += `*Today Sweeping Deployment*\n`;
        message += `===============================\n`;
        message += `*Date:* ${formattedDate}\n`;
        message += `*Ward:* ${ward}\n`;
        message += `*Unit:* ${unit}\n`;
        if (eWard) message += `*E-Ward:* ${eWard}\n`;
        message += `===============================\n`;
        message += `*Sweeping Routes:*\n`;
        
        const checkedBoxes = document.querySelectorAll('#checkboxesList input[type="checkbox"]:checked');
        
        if (checkedBoxes.length > 0) {
            let counter = 1;
            checkedBoxes.forEach(box => {
                const routeNum = box.id.split('_')[1];
                message += `${counter}. R${routeNum}: ${box.value}\n`;
                counter++;
            });
        } else {
            message += `- No routes selected -\n`;
        }
        
        messageOutput.value = message;
    }
    
    copyBtn.addEventListener('click', function() {
        if (messageOutput.value.trim() !== "") {
            messageOutput.select();
            messageOutput.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(messageOutput.value).then(() => {
                copyFeedback.style.display = 'block';
                setTimeout(() => {
                    copyFeedback.style.display = 'none';
                }, 3000);
            });
        }
    });
</script>
